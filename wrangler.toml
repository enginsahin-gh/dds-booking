# DDS Booking API Worker
name = "dds-booking-api"
main = "workers/api.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Environment variables are set via `wrangler secret put`
# SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, MOLLIE_API_KEY, EMAIL_SECRET, etc.

[vars]
SITE_URL = "https://api.bellure.nl"
FRONTEND_URL = "https://mijn.bellure.nl"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "91fd7b23c18a4ea08259b7be1660a2be"

# Cron trigger: check for appointment reminders every 15 minutes
[triggers]
crons = ["*/15 * * * *", "0 6 * * *"]
